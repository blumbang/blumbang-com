<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Not Found — Blumbang</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400&family=Montserrat:wght@300;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#15110c;--text:#E9DFCB;--muted:#9b9079;--muted2:#6f6657;--gold:#C9A84C;--line:#2e2619;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Montserrat',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;}
.wordmark{font-family:'Fraunces',Georgia,serif;font-weight:400;font-size:1.3rem;letter-spacing:.04em;color:var(--text);margin-bottom:64px;opacity:.6;}
.wordmark .spark{color:var(--gold);}
.code{font-family:'Fraunces',Georgia,serif;font-weight:400;font-size:clamp(5rem,18vw,10rem);line-height:1;color:var(--gold);opacity:.18;margin-bottom:8px;}
h1{font-family:'Fraunces',Georgia,serif;font-weight:400;font-size:clamp(1.6rem,4vw,2.6rem);color:#fff;margin-bottom:16px;line-height:1.1;}
p{font-size:.95rem;font-weight:300;color:var(--muted);max-width:38ch;line-height:1.75;margin-bottom:40px;}
.links{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.btn{font-size:.7rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;padding:13px 28px;text-decoration:none;transition:all .2s;}
.btn-gold{background:var(--gold);color:var(--bg);}
.btn-gold:hover{opacity:.88;}
.btn-ghost{border:1px solid var(--line);color:var(--muted);}.btn-ghost:hover{border-color:var(--gold);color:var(--gold);}
</style>
</head>
<body>
<div class="wordmark">BLUMB<span class="spark">&#10022;</span>NG</div>
<div class="code">404</div>
<h1>This piece has<br><em style="font-style:italic;color:var(--gold)">moved on.</em></h1>
<p>The page you're looking for doesn't exist — or the piece has already found its person.</p>
<div class="links">
  <a href="/" class="btn btn-gold">Back to home</a>
  <a href="/makers" class="btn btn-ghost">See the makers</a>
</div>
</body>
</html>
